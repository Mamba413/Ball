name: PyPI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "Python-package/**"
      - "src/**"
      - ".github/workflows/pypi.yml"
  release:
    types:
      - published

jobs:
  build_sdist:
    name: Build SDist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy C sources into package
        run: cp -r src Python-package/src

      - name: Build SDist
        working-directory: Python-package
        run: pipx run build --sdist

      - name: Check metadata
        working-directory: Python-package
        run: pipx run twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: artifact-sdist
          path: Python-package/dist/*.tar.gz

  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Copy C sources into package
        run: cp -r src Python-package/src
        shell: bash

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        with:
          package-dir: ./Python-package
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* pp*"
          CIBW_ARCHS_LINUX: "auto64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_TEST_COMMAND: >-
            python -c "from Ball import bd_test, bcov_test, bd, bcov; print('import OK')"

      - name: Verify clean directory
        run: git diff --exit-code
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: artifact-wheel-${{ matrix.os }}
          path: wheelhouse/*.whl

  upload_PyPI:
    name: Upload to PyPI if release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
